# BrainrotFilter Squid Configuration Snippet
# This file is managed by BrainrotFilter. Manual edits may be overwritten.
#
# Place in /etc/squid/conf.d/brainrotfilter.conf
# Ensure your main squid.conf includes: include /etc/squid/conf.d/*.conf

# SSL bump configuration for YouTube interception
# Requires squid built with --enable-ssl-crtd (squid-openssl package)

# CA certificate for SSL bumping
# sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 64MB
# ssl_bump peek all
# ssl_bump stare youtube_domains
# ssl_bump bump youtube_domains
# ssl_bump splice all

# BrainrotFilter URL rewriter
# url_rewrite_program /usr/local/bin/brainrotfilter/squid_redirector.sh
# url_rewrite_children 5 startup=2 idle=1 concurrency=0

# BrainrotFilter external ACL
# external_acl_type brainrot_check ttl=60 %URI /usr/local/bin/brainrotfilter/squid_acl_helper.sh
# acl brainrot_blocked external brainrot_check
# http_access deny brainrot_blocked

# YouTube domains ACL
# acl youtube_domains ssl::server_name .youtube.com
# acl youtube_domains ssl::server_name .googlevideo.com
# acl youtube_domains ssl::server_name .ytimg.com
# acl youtube_domains ssl::server_name youtu.be

# Note: The setup wizard will activate and configure these settings.
# Lines are commented out by default to prevent breaking Squid on install.
