name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/brainrotfilter/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402,F401,E722,E241,E302,E741,F841,E128

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        env:
          BRAINROT_WIZARD_SKIP: "1"
          BRAINROT_DB_PATH: /tmp/brainrotfilter_test.db
          BRAINROT_CONFIG_DIR: /tmp/brainrotfilter_test_config
          BRAINROT_DATA_DIR: /tmp/brainrotfilter_test_data
