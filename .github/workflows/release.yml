name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper dh-python python3

      - name: Build .deb package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Find built package
        id: find_deb
        run: |
          DEB_FILE=$(ls ../brainrotfilter_*.deb 2>/dev/null | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "ERROR: No .deb file found"
            exit 1
          fi
          echo "deb_path=$DEB_FILE" >> "$GITHUB_OUTPUT"
          echo "deb_name=$(basename $DEB_FILE)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.find_deb.outputs.deb_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
